<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nova Attachments</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none; -webkit-user-select: none;
    }

    #panel {
      width: 100%; height: 100%;
      background: rgba(6, 10, 20, 0.96);
      border: 1px solid rgba(120, 80, 255, 0.28);
      border-radius: 16px;
      padding: 14px 16px 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.8), 0 0 28px rgba(120,80,255,0.08);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px; color: #dde8f0;
      display: flex; flex-direction: column;
      animation: slideIn 0.22s cubic-bezier(0.22,1,0.36,1);
      -webkit-app-region: drag;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    #header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; -webkit-app-region: drag;
    }
    #title {
      font-size: 13px; font-weight: 700;
      color: #a78bfa; letter-spacing: 0.4px;
      display: flex; align-items: center; gap: 6px;
    }
    #type-badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px;
      border-radius: 10px; background: rgba(120,80,255,0.18);
      border: 1px solid rgba(120,80,255,0.3); color: #c4b5fd;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    #close-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.3); font-size: 14px;
      cursor: pointer; padding: 2px 5px; border-radius: 4px;
      -webkit-app-region: no-drag;
      transition: color 0.15s, background 0.15s;
    }
    #close-btn:hover { color: #ff6b6b; background: rgba(255,80,80,0.1); }

    #search-wrap {
      margin-bottom: 8px;
      -webkit-app-region: no-drag;
    }
    #search {
      width: 100%; padding: 5px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(120,80,255,0.2);
      border-radius: 8px;
      color: #dde8f0; font-size: 11px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: rgba(255,255,255,0.25); }
    #search:focus { border-color: rgba(120,80,255,0.5); }

    #count {
      font-size: 10px; color: rgba(255,255,255,0.3);
      margin-bottom: 7px; padding-left: 2px;
    }

    #list {
      flex: 1; overflow-y: auto;
      -webkit-app-region: no-drag;
    }
    #list::-webkit-scrollbar { width: 3px; }
    #list::-webkit-scrollbar-track { background: transparent; }
    #list::-webkit-scrollbar-thumb { background: rgba(120,80,255,0.3); border-radius: 4px; }

    .file-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 8px; border-radius: 8px;
      transition: background 0.12s;
      cursor: default;
    }
    .file-item:hover { background: rgba(120,80,255,0.08); }
    .file-item.selected {
      background: rgba(120,80,255,0.18);
      border: 1px solid rgba(120,80,255,0.3);
    }

    .file-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(120,80,255,0.3), rgba(60,40,180,0.5));
      border: 1px solid rgba(120,80,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }

    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 12px; font-weight: 600; color: #e8f0f8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-num {
      font-size: 10px; color: rgba(120,80,255,0.7);
      font-weight: 700;
    }

    #selected-bar {
      display: none;
      margin-top: 8px; padding: 7px 10px;
      background: rgba(120,80,255,0.15);
      border: 1px solid rgba(120,80,255,0.3);
      border-radius: 8px;
      font-size: 11px; color: #c4b5fd;
      -webkit-app-region: no-drag;
    }
    #selected-bar.visible { display: block; }

    #empty {
      display: none; flex: 1;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      color: rgba(255,255,255,0.25); font-size: 12px; text-align: center;
    }
    #empty .icon { font-size: 28px; opacity: 0.4; }

    #footer {
      margin-top: 8px; padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10px; color: rgba(255,255,255,0.22);
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="panel">
    <div id="header">
      <div id="title">
        📎 Attachments
        <span id="type-badge">—</span>
      </div>
      <button id="close-btn" title="Close">✕</button>
    </div>

    <div id="search-wrap">
      <input id="search" type="text" placeholder="Filter files…" autocomplete="off" />
    </div>

    <div id="count"></div>
    <div id="list"></div>

    <div id="empty">
      <div class="icon">📂</div>
      <div>No files found</div>
    </div>

    <div id="selected-bar" id="selected-bar"></div>

    <div id="footer">Say the filename to attach it to your email</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const ICONS = {
      video:    '🎬',
      document: '📄',
      image:    '🖼️',
    };

    let allFiles = [];
    let fileType = 'document';
    let selectedIdx = -1;

    function ext2icon(name) {
      const e = name.split('.').pop().toLowerCase();
      if (['mp4','mkv','avi','mov','webm','m4v'].includes(e)) return '🎬';
      if (['pdf'].includes(e)) return '📕';
      if (['doc','docx','odt','rtf'].includes(e)) return '📝';
      if (['xls','xlsx','ods','csv'].includes(e)) return '📊';
      if (['ppt','pptx','odp'].includes(e)) return '📑';
      if (['txt'].includes(e)) return '📃';
      if (['jpg','jpeg','png','gif','webp','bmp'].includes(e)) return '🖼️';
      return '📎';
    }

    function render(files) {
      const list  = document.getElementById('list');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      list.innerHTML = '';
      if (files.length === 0) {
        list.style.display = 'none';
        empty.style.display = 'flex';
        count.textContent = '';
        return;
      }

      list.style.display = 'block';
      empty.style.display = 'none';
      count.textContent = `${files.length} file${files.length !== 1 ? 's' : ''}`;

      files.forEach((f, i) => {
        const globalIdx = allFiles.findIndex(af => af.absPath === f.absPath);
        const item = document.createElement('div');
        item.className = 'file-item' + (globalIdx === selectedIdx ? ' selected' : '');

        const icon = document.createElement('div');
        icon.className = 'file-icon';
        icon.textContent = ext2icon(f.name);

        const info = document.createElement('div');
        info.className = 'file-info';

        const num = document.createElement('div');
        num.className = 'file-num';
        num.textContent = `#${globalIdx + 1}`;

        const name = document.createElement('div');
        name.className = 'file-name';
        name.textContent = f.name;

        info.appendChild(num);
        info.appendChild(name);
        item.appendChild(icon);
        item.appendChild(info);
        list.appendChild(item);
      });
    }

    ipcRenderer.on('attachments-data', (_, data) => {
      allFiles = data.files || [];
      fileType  = data.fileType || 'document';
      selectedIdx = -1;

      document.getElementById('type-badge').textContent = fileType;
      document.getElementById('search').value = '';
      document.getElementById('selected-bar').classList.remove('visible');
      render(allFiles);
    });

    ipcRenderer.on('attachment-selected', (_, data) => {
      selectedIdx = data.index;
      const bar = document.getElementById('selected-bar');
      bar.textContent = `✅ Selected: ${data.name}`;
      bar.classList.add('visible');

      // re-render to show highlight
      const q = document.getElementById('search').value.toLowerCase().trim();
      const visible = q ? allFiles.filter(f => f.name.toLowerCase().includes(q)) : allFiles;
      render(visible);

      // scroll selected item into view
      const items = document.querySelectorAll('.file-item');
      const selItem = Array.from(items).find(el => el.classList.contains('selected'));
      if (selItem) selItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) { render(allFiles); return; }
      render(allFiles.filter(f => f.name.toLowerCase().includes(q)));
    });

    document.getElementById('close-btn').addEventListener('click', () => {
      ipcRenderer.send('attachments-panel-hide');
    });
  </script>
</body>
</html>
