<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nova Contacts</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none; -webkit-user-select: none;
    }

    #panel {
      width: 100%; height: 100%;
      background: rgba(6, 10, 20, 0.96);
      border: 1px solid rgba(0, 200, 255, 0.22);
      border-radius: 16px;
      padding: 14px 16px 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.8), 0 0 28px rgba(0,200,255,0.06);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px; color: #dde8f0;
      display: flex; flex-direction: column;
      animation: slideIn 0.22s cubic-bezier(0.22,1,0.36,1);
      -webkit-app-region: drag;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ── */
    #header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; -webkit-app-region: drag;
    }
    #title {
      font-size: 13px; font-weight: 700;
      color: #00c8ff; letter-spacing: 0.4px;
      display: flex; align-items: center; gap: 6px;
    }
    #title::before { content: '👤'; font-size: 12px; }
    #close-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.3); font-size: 14px;
      cursor: pointer; padding: 2px 5px; border-radius: 4px;
      -webkit-app-region: no-drag;
      transition: color 0.15s, background 0.15s;
    }
    #close-btn:hover { color: #ff6b6b; background: rgba(255,80,80,0.1); }

    /* ── Search ── */
    #search-wrap {
      margin-bottom: 8px;
      -webkit-app-region: no-drag;
    }
    #search {
      width: 100%; padding: 5px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,200,255,0.18);
      border-radius: 8px;
      color: #dde8f0; font-size: 11px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: rgba(255,255,255,0.25); }
    #search:focus { border-color: rgba(0,200,255,0.45); }

    /* ── Count ── */
    #count {
      font-size: 10px; color: rgba(255,255,255,0.3);
      margin-bottom: 7px; padding-left: 2px;
    }

    /* ── List ── */
    #list {
      flex: 1; overflow-y: auto;
      -webkit-app-region: no-drag;
    }
    #list::-webkit-scrollbar { width: 3px; }
    #list::-webkit-scrollbar-track { background: transparent; }
    #list::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.25); border-radius: 4px; }

    .contact-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 8px; border-radius: 8px;
      transition: background 0.12s;
      cursor: default;
    }
    .contact-item:hover { background: rgba(0,200,255,0.07); }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,200,255,0.3), rgba(0,100,200,0.5));
      border: 1px solid rgba(0,200,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #00c8ff;
      flex-shrink: 0;
    }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-size: 12px; font-weight: 600; color: #e8f0f8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .contact-email {
      font-size: 10px; color: rgba(255,255,255,0.35);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Empty / loading states ── */
    #empty {
      display: none; flex: 1;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      color: rgba(255,255,255,0.25); font-size: 12px; text-align: center;
    }
    #empty .icon { font-size: 28px; opacity: 0.4; }

    /* ── Footer hint ── */
    #footer {
      margin-top: 8px; padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10px; color: rgba(255,255,255,0.22);
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="panel">
    <div id="header">
      <div id="title">Contacts</div>
      <button id="close-btn" title="Close">✕</button>
    </div>

    <div id="search-wrap">
      <input id="search" type="text" placeholder="Filter contacts…" autocomplete="off" />
    </div>

    <div id="count"></div>

    <div id="list"></div>

    <div id="empty">
      <div class="icon">👤</div>
      <div>No contacts found</div>
    </div>

    <div id="footer">Say "send an email to [name]" to compose</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let allContacts = [];

    function initials(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    function render(contacts) {
      const list  = document.getElementById('list');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      list.innerHTML = '';
      if (contacts.length === 0) {
        list.style.display = 'none';
        empty.style.display = 'flex';
        count.textContent = '';
        return;
      }

      list.style.display = 'block';
      empty.style.display = 'none';
      count.textContent = `${contacts.length} contact${contacts.length !== 1 ? 's' : ''}`;

      for (const c of contacts) {
        const item = document.createElement('div');
        item.className = 'contact-item';

        const av = document.createElement('div');
        av.className = 'avatar';
        av.textContent = initials(c.displayName || c.email);

        const info = document.createElement('div');
        info.className = 'contact-info';

        const name = document.createElement('div');
        name.className = 'contact-name';
        name.textContent = c.displayName || c.email;

        const email = document.createElement('div');
        email.className = 'contact-email';
        email.textContent = c.email;

        info.appendChild(name);
        info.appendChild(email);
        item.appendChild(av);
        item.appendChild(info);
        list.appendChild(item);
      }
    }

    ipcRenderer.on('contacts-data', (_, contacts) => {
      allContacts = contacts || [];
      document.getElementById('search').value = '';
      render(allContacts);
    });

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) { render(allContacts); return; }
      render(allContacts.filter(c =>
        c.displayName?.toLowerCase().includes(q) || c.email?.toLowerCase().includes(q)
      ));
    });

    document.getElementById('close-btn').addEventListener('click', () => {
      ipcRenderer.send('contacts-panel-hide');
    });

    ipcRenderer.on('scroll-contacts', (_, direction) => {
      const list = document.getElementById('list');
      const amount = direction === 'scroll_up' ? -160 : 160;
      list.scrollBy({ top: amount, behavior: 'smooth' });
    });
  </script>
</body>
</html>
