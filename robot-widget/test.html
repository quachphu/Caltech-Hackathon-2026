<html><body><script>const SR = window.SpeechRecognition || window.webkitSpeechRecognition; if(SR){const sr = new SR(); sr.onstart=()=>console.log("STARTED"); sr.onerror=(e)=>console.log("ERR:",e.error); sr.onresult=(e)=>console.log("RES:",e); setTimeout(()=>sr.start(), 500);}else{console.log("NO_API")} setTimeout(() => require("electron").ipcRenderer.send("done"), 4000);</script></body></html>
